<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mobile Snake Game</title>
<style>
    * {
        box-sizing: border-box;
        touch-action: manipulation; /* Prevents double-tap zoom */
    }

    body {
        margin: 0;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        overflow: hidden; /* Prevent scrolling */
    }

    h2 {
        margin: 10px 0;
        font-size: 20px;
        color: #00ff00;
        text-shadow: 0 0 5px #00ff00;
    }

    #game-container {
        position: relative;
        border: 4px solid #333;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }

    canvas {
        display: block;
        background: #000;
    }

    #scoreboard {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 300px;
        margin-bottom: 5px;
        font-size: 16px;
        font-weight: bold;
    }

    /* Overlay for Start/Game Over */
    #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }

    #overlay h1 {
        font-size: 30px;
        margin-bottom: 10px;
        color: #fff;
    }

    #start-btn {
        padding: 10px 25px;
        font-size: 18px;
        background: #00ff00;
        color: #000;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    /* Controls Area */
    .controls {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 70px 70px 70px;
        grid-template-rows: 70px 70px;
        gap: 10px;
        justify-content: center;
    }

    .btn {
        width: 70px;
        height: 70px;
        background: #333;
        border: 2px solid #555;
        border-radius: 50%;
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 4px 0 #111;
    }

    .btn:active {
        background: #00ff00;
        color: black;
        box-shadow: 0 0 0 #111;
        transform: translateY(4px);
    }

    /* Grid positioning for D-Pad */
    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

</style>
</head>
<body>

    <div id="scoreboard">
        <span>Score: <span id="score">0</span></span>
        <span>High: <span id="highScore">0</span></span>
    </div>

    <div id="game-container">
        <canvas id="game" width="300" height="300"></canvas>
        
        <div id="overlay">
            <h1 id="overlay-title">SNAKE</h1>
            <button id="start-btn" onclick="startGame()">PLAY</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn up" onclick="changeDirection('UP')">⬆️</div>
        <div class="btn left" onclick="changeDirection('LEFT')">⬅️</div>
        <div class="btn down" onclick="changeDirection('DOWN')">⬇️</div>
        <div class="btn right" onclick="changeDirection('RIGHT')">➡️</div>
    </div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const startBtn = document.getElementById("start-btn");

    // Game Settings
    const box = 15; // Size of one grid square
    let snake = [];
    let food = {};
    let direction;
    let score = 0;
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    let gameLoop;
    let gameSpeed = 100; // Milliseconds per frame (lower is faster)
    let isGameRunning = false;

    highScoreEl.innerText = highScore;

    // Initialize Game
    function initGame() {
        snake = [{x: 10 * box, y: 10 * box}]; // Start in middle
        direction = "RIGHT";
        score = 0;
        scoreEl.innerText = score;
        gameSpeed = 100;
        placeFood();
    }

    function placeFood() {
        food = {
            x: Math.floor(Math.random() * (canvas.width / box)) * box,
            y: Math.floor(Math.random() * (canvas.height / box)) * box
        };
        // Ensure food doesn't spawn on snake body
        for(let part of snake) {
            if(part.x === food.x && part.y === food.y) {
                placeFood();
            }
        }
    }

    function startGame() {
        initGame();
        isGameRunning = true;
        overlay.style.display = "none";
        gameLoop = setInterval(draw, gameSpeed);
    }

    function gameOver() {
        isGameRunning = false;
        clearInterval(gameLoop);
        
        if(score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
            highScoreEl.innerText = highScore;
        }

        overlayTitle.innerText = "GAME OVER";
        startBtn.innerText = "RESTART";
        overlay.style.display = "flex";
    }

    function changeDirection(newDir) {
        if (!isGameRunning) return;

        // Prevent reversing directly
        if (newDir === "UP" && direction !== "DOWN") direction = "UP";
        if (newDir === "DOWN" && direction !== "UP") direction = "DOWN";
        if (newDir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
        if (newDir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    }

    // Keyboard support
    document.addEventListener("keydown", (e) => {
        if(e.key === "ArrowUp") changeDirection("UP");
        if(e.key === "ArrowDown") changeDirection("DOWN");
        if(e.key === "ArrowLeft") changeDirection("LEFT");
        if(e.key === "ArrowRight") changeDirection("RIGHT");
    });

        ctx
